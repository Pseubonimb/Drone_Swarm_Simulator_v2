# OFAT этап 2: перебор D при фиксированном P из этапа 1.
# Пример: python launch_simulation.py -s --kp 8 --batch-params scenarios/batch_parameters/ofat_snake_pursuit/stage2_kd.yaml
# Подставьте свой kp* вместо 8.

batch:
  scenario: snake_pursuit
  drones: 2
  duration_sec: 30.0

launch:
  batch_id: snake_ofat_s2_kd

experiment_settings:
  target_parameter: "pid.d_gain"
  range:
    start: 0.0
    stop: 20.0
    step: 5.0
